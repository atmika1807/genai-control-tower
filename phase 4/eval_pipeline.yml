name: RAG Eval Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  # Thresholds — PR blocked if any metric falls below these
  MIN_HIT_AT_5:  "0.90"
  MIN_MRR:       "0.85"
  MIN_NDCG:      "0.83"
  LATENCY_SLO:   "200"   # ms

jobs:

  # ── Unit tests ──────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install sentence-transformers==3.0.1 rank-bm25==0.2.2 pytest pytest-asyncio pytest-cov

      - name: Run unit tests
        run: |
          pytest tests/test_ingestion.py tests/test_query.py \
            -v --tb=short \
            --cov=ingestion --cov=query --cov=shared \
            --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true

  # ── Integration tests ───────────────────────────────────────────────────────
  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
      qdrant:
        image: qdrant/qdrant:v1.9.1
        ports: ["6333:6333"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install sentence-transformers==3.0.1 rank-bm25==0.2.2 \
                      pytest pytest-asyncio httpx

      - name: Run integration tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          QDRANT_URL: http://localhost:6333
          REDIS_URL: redis://localhost:6379/0
          MLFLOW_TRACKING_URI: sqlite:///mlflow_test.db
        run: |
          pytest tests/integration/ -v --tb=short \
            -m "not slow" \
            --timeout=60

  # ── Retrieval eval gate ─────────────────────────────────────────────────────
  eval-gate:
    name: Retrieval accuracy gate
    runs-on: ubuntu-latest
    needs: integration-tests
    # Only run on PRs targeting main — saves API cost on feature branches
    if: github.event_name == 'pull_request' && github.base_ref == 'main'

    services:
      qdrant:
        image: qdrant/qdrant:v1.9.1
        ports: ["6333:6333"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install sentence-transformers==3.0.1 rank-bm25==0.2.2 mlflow

      - name: Seed eval corpus
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          QDRANT_URL: http://localhost:6333
          MLFLOW_TRACKING_URI: sqlite:///mlflow_eval.db
        run: python -m tests.integration.seed_eval_corpus

      - name: Run retrieval eval suite
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          QDRANT_URL: http://localhost:6333
          MLFLOW_TRACKING_URI: sqlite:///mlflow_eval.db
        run: |
          python -m tests.integration.run_eval_gate \
            --min-hit-at-5  ${{ env.MIN_HIT_AT_5 }} \
            --min-mrr       ${{ env.MIN_MRR }} \
            --min-ndcg      ${{ env.MIN_NDCG }} \
            --output        eval_results.json

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.sha }}
          path: eval_results.json

      - name: Comment results on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('eval_results.json'));
            const pass = results.passed ? '✅ PASSED' : '❌ FAILED';
            const body = [
              `## RAG Eval Gate — ${pass}`,
              '',
              '| Metric | Score | Threshold | Status |',
              '|--------|-------|-----------|--------|',
              `| Hit@5  | ${results.hit_at_5.toFixed(3)} | ≥ ${{ env.MIN_HIT_AT_5 }} | ${results.hit_at_5 >= ${{ env.MIN_HIT_AT_5 }} ? '✅' : '❌'} |`,
              `| MRR    | ${results.mrr.toFixed(3)} | ≥ ${{ env.MIN_MRR }} | ${results.mrr >= ${{ env.MIN_MRR }} ? '✅' : '❌'} |`,
              `| nDCG@5 | ${results.ndcg_at_5.toFixed(3)} | ≥ ${{ env.MIN_NDCG }} | ${results.ndcg_at_5 >= ${{ env.MIN_NDCG }} ? '✅' : '❌'} |`,
              `| Latency | ${results.avg_latency_ms.toFixed(0)}ms | < ${{ env.LATENCY_SLO }}ms | ${results.avg_latency_ms < ${{ env.LATENCY_SLO }} ? '✅' : '❌'} |`,
              '',
              `Samples: ${results.n_samples} | Run: \`${context.sha.slice(0,7)}\``,
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail if gate not met
        run: |
          python -c "
          import json, sys
          r = json.load(open('eval_results.json'))
          if not r['passed']:
              print('Eval gate FAILED:', r)
              sys.exit(1)
          print('Eval gate PASSED:', r)
          "

  # ── Docker build check ──────────────────────────────────────────────────────
  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Build ingestion image
        run: docker build -f Dockerfile.ingestion -t genai-ingestion:ci .

      - name: Build query image
        run: docker build -f Dockerfile.query -t genai-query:ci .

      - name: Run container health check
        run: |
          docker run --rm genai-ingestion:ci python -c "
          from ingestion.config import settings
          from ingestion.chunker import ChunkingEngine
          c = ChunkingEngine()
          chunks = c.chunk('Hello world test.', doc_id='ci-test')
          assert len(chunks) >= 1
          print('Ingestion container OK')
          "
